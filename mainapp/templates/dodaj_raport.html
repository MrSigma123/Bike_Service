{% extends "base.html" %}

{% block title %}Dodaj raport naprawy{% endblock %}

{% block content %}
<h2>Dodaj raport naprawy</h2>

<p>Opisz wykonane czynności serwisowe.</p>

<form method="post" class="form-box">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="actions">
        <button type="submit" class="btn">Zapisz raport</button>
        <a href="{% url 'zlecenia' %}" class="btn">Powrót</a>
    </div>
</form>
{% endblock %}
