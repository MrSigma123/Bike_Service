{% extends "base.html" %}

{% block title %}Dodaj pozycję zamówienia{% endblock %}

{% block content %}
<h2>Dodaj pozycję zamówienia</h2>

<p>Dodaj część, ilość i cenę jednostkową do istniejącego zamówienia części.</p>

<form method="post" class="form-box">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="actions">
        <button type="submit" class="btn">Zapisz pozycję</button>
        <a href="{% url 'zamowienia_czesci' %}" class="btn">Powrót</a>
    </div>
</form>
{% endblock %}
