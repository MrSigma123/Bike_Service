{% extends "base.html" %}

{% block title %}Powiadomienia{% endblock %}

{% block content %}
<h2>Powiadomienia</h2>

<table>
    <tr>
        <th>Data</th>
        <th>Zlecenie</th>
        <th>Treść</th>
    </tr>

    {% for p in powiadomienia %}
    <tr>
        <td>{{ p.data_wyslania }}</td>
        <td>{{ p.zlecenie }}</td>
        <td>{{ p.tresc }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">Brak powiadomień.</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
