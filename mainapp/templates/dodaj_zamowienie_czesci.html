{% extends "base.html" %}

{% block title %}Dodaj zamówienie części{% endblock %}

{% block content %}
<h2>Dodaj zamówienie części</h2>

<p>Formularz tworzenia zamówienia części u dostawcy.</p>

<form method="post" class="form-box">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="actions">
        <button type="submit" class="btn">Zapisz zamówienie</button>
        <a href="{% url 'zamowienia_czesci' %}" class="btn">Powrót</a>
    </div>
</form>
{% endblock %}
