<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Serwis rowerowy{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            color: #222;
        }
        header {
            background: #1f3b5b;
            color: white;
            padding: 16px 24px;
        }
        nav a {
            color: white;
            margin-right: 16px;
            text-decoration: none;
        }
        main {
            max-width: 900px;
            margin: 24px auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #efefef;
        }
        .box {
            background: #f8f9fb;
            border: 1px solid #d9e2ec;
            padding: 16px;
            margin: 16px 0;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <header>
        <h1>System serwisu rowerowego</h1>
        <nav>
            <a href="/">Strona główna</a>
            <a href="/zgloszenia/">Zgłoszenia</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock content %}
    </main>
</body>
</html>
